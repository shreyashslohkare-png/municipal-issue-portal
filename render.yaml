services:
  - type: web
    name: municipal-issue-portal
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: municipal-issue-data
      mountPath: /var/data
      sizeGB: 1
